# pnpm settings live here in pnpm 11: the package.json `pnpm` field is no longer read, and
# `.npmrc` is auth-only. No `packages:` field — a single-package repo's root is included
# automatically; add `packages: ['packages/*']` only if this repo becomes a workspace.

# --- Supply-chain / toolchain baseline (every archetype) ---
allowBuilds:
  esbuild: true # reviewed Promptfoo transitive dependency; esbuild needs its install script for the platform binary
  "@playwright/browser-chromium": true # reviewed Promptfoo transitive browser package for optional HTML/report flows
  "@swc/core": true # reviewed Promptfoo transitive compiler package; install script selects the local binary
  better-sqlite3: true # reviewed Promptfoo transitive store package; native install script builds the local binding
  onnxruntime-node: true # reviewed Promptfoo transitive model runtime package; install script selects the local binary
  protobufjs: true # reviewed Promptfoo transitive serialization package; install script builds the CLI entrypoints
  sharp: true # reviewed Promptfoo transitive media package; install script selects the local binary
minimumReleaseAge: 1440 # skip versions published < 1 day ago (raise to 10080 for a 1-week window)
minimumReleaseAgeExclude: [] # exempt a package when you must pull a fresh release immediately
overrides:
  "@opentelemetry/core": 2.8.0 # Promptfoo transitive currently ranges to unpublished 2.9.0
  "@opentelemetry/resources": 2.8.0
  "@opentelemetry/sdk-trace-base": 2.8.0
  "@opentelemetry/sdk-trace-node": 2.8.0
engineStrict: true # make engines.node a hard gate, not a warning
nodeVersion: "22.22.0" # evaluate dependency engines against the supported floor (Promptfoo Codex provider needs >=22.22)
pmOnFail: error # fail if the running pnpm differs from the packageManager pin (vs silent download)
